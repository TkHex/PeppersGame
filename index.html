<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игруха</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
</head>

<body>

    <div class="hero">
        <h1 class="hero-title">Великолепная игра</h1>
        <h1 class="hero-dead">
            You dead...</br>
            <span class="hero-dead-span">Попробуйте снова!</span>
        </h1>

        <h1 class="hero-win">
            Победа!</br>
            <span class="hero-win-span">Сыграйте снова!</span>
        </h1>

        <button class="hero-button">Играть</button>
    </div>

    <h2 class="help-title-2">A - Влево, D - Вправо (или стрелки)</h2>
    <h1 class="help-title-1">Нажми пробел, чтобы начать играть</h1>
    <canvas id="canvas">Not supported</canvas>
    <div class="canvas-block-score">
        <p>Очки:
            <span class="points">0</span>
        </p>

        <p class="lifes">
            Жизни:
            <span class="lifes-counter">3</span>
        </p>
    </div>

    <script src="./index.js"></script>
</body>

</html>
